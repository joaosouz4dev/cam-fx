name: Release

# A cada push na main: auto-incrementa a versao (patch), compila a camera
# virtual + app + instalador, cria a tag e publica o release com o
# CamFX-Setup.exe. Comeca em 0.0.1 se nao houver tag.

on:
  push:
    branches: [main]
    paths-ignore:              # mudancas so de docs nao geram release
      - "**.md"
      - "src/**"               # post do blog do site (outro projeto)
      - ".gitignore"
  workflow_dispatch: {}        # permite rodar manualmente tambem

permissions:
  contents: write              # criar tags e releases

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # precisa do historico p/ ler as tags

      - name: Calcular proxima versao
        id: ver
        shell: pwsh
        run: |
          git fetch --tags --force
          $last = git tag --list "v*" --sort=-v:refname | Select-Object -First 1
          if (-not $last) {
            $next = "0.0.1"
          } else {
            $p = $last.TrimStart("v").Split(".")
            $next = "$($p[0]).$($p[1]).$([int]$p[2] + 1)"
          }
          "version=$next" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$next"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Proxima versao: $next (anterior: $last)"

      - name: Injetar versao no app
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          "__version__ = `"$v`"" | Out-File -FilePath camfx\_version.py -Encoding utf8
          Write-Host "camfx/_version.py -> $v"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias Python
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Instalar dependencias do face swap (motor DLC)
        shell: pwsh
        run: |
          # Deps do face swap. insightface com --no-deps para nao puxar
          # onnxruntime/numpy conflitantes; transitivas listadas no arquivo.
          pip install --no-deps -r requirements-faceswap.txt
          # onnxruntime-gpu (CUDA 12) no lugar do -directml para o motor DLC.
          # As DLLs do cuDNN/cuBLAS via pip acompanham o bundle e o
          # enable_cuda_dlls() as poe no PATH em runtime. Sem GPU NVIDIA, o
          # onnxruntime-gpu ainda roda em CPU.
          pip uninstall -y onnxruntime-directml onnxruntime
          pip install onnxruntime-gpu==1.22.0 "nvidia-cudnn-cu12>=9,<10" nvidia-cublas-cu12

      - name: Montar a camera virtual (mfref)
        shell: pwsh
        run: ./setup_driver.ps1

      - name: Compilar a camera virtual (DLL + helper)
        shell: pwsh
        run: ./build_driver.ps1

      - name: Testar a logica do demand loop (regressao do face swap)
        shell: pwsh
        run: |
          # Trava o bug em que ligar o face swap derrubava o pipeline (0 FPS
          # sem swap). Teste puro (sem UI/camera): se a logica regredir, o
          # release NAO sai.
          python tools/test_demand_logic.py
          if ($LASTEXITCODE -ne 0) { throw "TESTE DO DEMAND LOOP FALHOU" }

      - name: Gerar o executavel (PyInstaller)
        shell: pwsh
        run: python build.py

      - name: Validar o bundle (self-check do face swap)
        shell: pwsh
        timeout-minutes: 5
        run: |
          # Roda o exe empacotado com --selfcheck: importa toda a cadeia do
          # face swap DENTRO do bundle. Se faltar algum modulo (urllib3, joblib,
          # scipy... - o que quebrou v0.0.15/16), o exit e 1 e o release NAO sai.
          # Impede publicar instalador quebrado. O selfcheck so IMPORTA (nao
          # baixa modelo nem abre camera), entao roda rapido mesmo sem GPU; o
          # 1o load pode levar ~1-2min pela compilacao de bytecode do bundle.
          # O exe e --windowed (GUI): `& $exe` NAO bloqueia e $LASTEXITCODE nao
          # reflete o exit real. Usar Start-Process -Wait -PassThru para esperar
          # o processo terminar e pegar o ExitCode de verdade.
          $exe = "dist\CamFX\CamFX.exe"
          Remove-Item "$env:LOCALAPPDATA\CamFX\selfcheck.txt" -ErrorAction SilentlyContinue
          $p = Start-Process -FilePath $exe -ArgumentList "--selfcheck" -Wait -PassThru
          $code = $p.ExitCode
          $result = Get-Content "$env:LOCALAPPDATA\CamFX\selfcheck.txt" -ErrorAction SilentlyContinue
          Write-Host "selfcheck exit=$code resultado: $result"
          if ($code -ne 0) { throw "SELFCHECK FALHOU (modulo faltando no bundle): $result" }

      - name: Instalar Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Gerar o instalador
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" installer\camfx.iss
          if (-not (Test-Path "installer\output\CamFX-Setup.exe")) { throw "Instalador nao gerado." }

      - name: Criar tag
        shell: pwsh
        run: |
          git tag ${{ steps.ver.outputs.tag }}
          git push origin ${{ steps.ver.outputs.tag }}

      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: CamFX ${{ steps.ver.outputs.version }}
          files: installer/output/CamFX-Setup.exe
          body: |
            ## CamFX ${{ steps.ver.outputs.version }} — Câmera virtual com blur de fundo para Windows 11

            ⬇️ Baixe o **CamFX-Setup.exe** abaixo e execute (Windows 11 22H2+).

            ### Instalação
            1. Execute o `CamFX-Setup.exe` (pede permissão de administrador).
            2. Abra o CamFX e selecione a câmera **CamFX** no seu app de vídeo.

            ### Aviso do Windows SmartScreen
            O instalador não é assinado digitalmente. Se aparecer "O Windows protegeu o seu PC":
            **Mais informações → Executar assim mesmo**. O código-fonte é aberto e auditável.
